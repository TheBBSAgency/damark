<!-- @startingPoint section="Website" subtitle="Full Damark marketing site — home, about, services + detail pages, careers, RFQ contact" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Damark Manufacturing — Precision Machining, Lomira WI</title>
<link rel="stylesheet" href="./styles.css" />
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #fff; }
  .page { background: #fff; overflow-x: hidden; }
  .page img { max-width: 100%; }
  @media (max-width: 860px) {
    /* collapse every multi-column layout to a single column */
    .page [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    /* tighten the shared 1240 / 920 content wrappers to phone gutters */
    .page [style*="max-width: 1240px"], .page [style*="max-width: 920px"] { padding-left: 18px !important; padding-right: 18px !important; }
    /* trim the oversized hero vertical padding */
    .page [style*="104px 32px 96px"], .page [style*="72px 32px 64px"], .page [style*="64px 32px 60px"], .page [style*="76px 32px 68px"], .page [style*="72px 32px 8px"] { padding-top: 48px !important; padding-bottom: 44px !important; }
    /* normalize alternating image/text rows to image-first */
    .page [style*="order: 1"], .page [style*="order: 2"] { order: 0 !important; }
    /* let the footer legal bar stack instead of crowding */
    .page footer [style*="justify-content: space-between"] { flex-wrap: wrap; gap: 8px; }
    /* shorter media on small screens */
    .page image-slot { height: 260px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
<script src="image-slot.js"></script>
<script src="servicesData.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="SiteHeader.jsx"></script>
<script type="text/babel" src="SiteFooter.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="ServicesScreen.jsx"></script>
<script type="text/babel" src="ServiceDetailScreen.jsx"></script>
<script type="text/babel" src="AboutScreen.jsx"></script>
<script type="text/babel" src="ContactScreen.jsx"></script>
<script type="text/babel" src="CareersScreen.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroOverlay": 0.85,
  "servicesAccent": "navy",
  "showProofBand": true
}/*EDITMODE-END*/;
function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = React.useState('home');
  const go = (r) => { setRoute(r); window.scrollTo({ top: 0, behavior: 'auto' }); };
  let screen;
  if (route.indexOf('service:') === 0) {
    screen = <window.ServiceDetailScreen go={go} slug={route.slice(8)} />;
  } else {
    const Screen = { home: window.HomeScreen, services: window.ServicesScreen, about: window.AboutScreen, contact: window.ContactScreen, careers: window.CareersScreen }[route] || window.HomeScreen;
    screen = <Screen go={go} tweaks={t} />;
  }
  const navRoute = route.indexOf('service:') === 0 ? 'services' : route;
  const { TweaksPanel, TweakSection, TweakSlider, TweakRadio, TweakToggle } = window;
  return (
    <div className="page">
      <window.SiteHeader route={navRoute} go={go} />
      {screen}
      <window.SiteFooter go={go} />
      <TweaksPanel>
        <TweakSection label="Homepage" />
        <TweakSlider label="Hero overlay" value={t.heroOverlay} min={0.4} max={1} step={0.05}
          onChange={(v) => setTweak('heroOverlay', v)} />
        <TweakToggle label="Proof stat band" value={t.showProofBand}
          onChange={(v) => setTweak('showProofBand', v)} />
        <TweakRadio label="Services card accent" value={t.servicesAccent}
          options={['navy', 'steel', 'brass']}
          onChange={(v) => setTweak('servicesAccent', v)} />
      </TweaksPanel>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
